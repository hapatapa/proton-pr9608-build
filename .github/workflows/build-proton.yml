name: Build Proton 10.0 + mshtml xdg-open redirect

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name (shows in Steam)'
        required: false
        default: 'Proton-10.0-PR9608'

env:
  PROTON_BRANCH: proton_10.0

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcActions
          sudo rm -rf /usr/local/graalvm /opt/hostedtoolcache /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules /opt/azopy
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo docker image prune -af
          sudo rm -rf /tmp/* /var/tmp/*
          df -h /

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            git \
            make \
            python3

      - name: Clone Proton ${{ env.PROTON_BRANCH }}
        run: |
          git clone --branch ${{ env.PROTON_BRANCH }} --depth 1 --recursive \
            https://github.com/ValveSoftware/Proton.git proton-src

      - name: Apply PR #9608 fix (lsteamclient)
        run: |
          cd proton-src
          cp ../lsteamclient_unixlib_patched.cpp lsteamclient/unixlib.cpp

      - name: Configure build
        run: |
          mkdir build-dir
          cd build-dir
          ../proton-src/configure.sh \
            --build-name=${{ github.event.inputs.build_name || 'Proton-10.0-PR9608' }} \
            --container-engine=docker

      - name: Build Proton (redist) with mshtml patch
        working-directory: build-dir
        run: |
          # The build takes ~3.5 hours. Wine source gets cloned during the build
          # into obj-wine64/src-wine/ on a volume mount back to this directory.
          # We start the build in background, watch for navigate.c to appear,
          # patch it in-place, then let the build continue compiling.
          #
          # The patch script (patch_mshtml_navigate.py) injects code into
          # navigate_url() that calls fork()+execlp("xdg-open",...) for any
          # http/https URL, returning S_OK without rendering in Wine's IE engine.

          # Start the build in background, redirect to file (not pipe) so we
          # capture the real exit code from make, not from tee.
          make redist > build.log 2>&1 &
          BUILD_PID=$!

          # Watch for navigate.c and patch it
          echo "Watching for Wine source to be cloned..."
          for i in $(seq 1 720); do  # Check every 5 seconds for up to 1 hour
              sleep 5
              NAVFILE=$(find obj-wine64/src-wine obj-wine32/src-wine src-wine \
                  -name navigate.c -path "*/mshtml/*" 2>/dev/null | head -1)
              if [ -n "$NAVFILE" ] && [ -f "$NAVFILE" ]; then
                  if ! grep -q "xdg-open" "$NAVFILE"; then
                      echo "=== FOUND navigate.c at $NAVFILE, patching now ===" >> build.log
                      python3 ../patch_mshtml_navigate.py "$NAVFILE" 2>&1 | tee -a build.log
                      echo "=== Patch applied! ===" >> build.log
                      # Also check 32-bit wine source
                      NAVFILE32=$(find obj-wine32/src-wine src-wine \
                          -name navigate.c -path "*/mshtml/*" 2>/dev/null | head -1)
                      if [ -n "$NAVFILE32" ] && [ "$NAVFILE32" != "$NAVFILE" ] && [ -f "$NAVFILE32" ]; then
                          if ! grep -q "xdg-open" "$NAVFILE32"; then
                              echo "=== Also patching 32-bit navigate.c at $NAVFILE32 ===" >> build.log
                              python3 ../patch_mshtml_navigate.py "$NAVFILE32" 2>&1 | tee -a build.log
                          fi
                      fi
                      break
                  else
                      echo "navigate.c already patched" >> build.log
                      break
                  fi
              fi
              if ! kill -0 $BUILD_PID 2>/dev/null; then
                  echo "Build process ended unexpectedly" >> build.log
                  break
              fi
          done

          # Wait for build to finish and capture real exit code
          echo "Waiting for build to complete..." >> build.log
          wait $BUILD_PID
          BUILD_EXIT=$?
          echo "Build finished with exit code $BUILD_EXIT" >> build.log
          exit $BUILD_EXIT

      - name: Package redist
        if: success()
        run: |
          cd build-dir
          tar -cf proton-pr9608-redist.tar redist/

      - name: Upload Proton build artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-10.0-pr9608
          path: build-dir/proton-pr9608-redist.tar
          retention-days: 14
          if-no-files-found: error

      - name: Build log summary
        if: always()
        run: |
          if [ -f build-dir/build.log ]; then
            echo "### Build Errors (last 50 lines with Error)" >> $GITHUB_STEP_SUMMARY
            grep -n '] Error [0-9]' build-dir/build.log | tail -50 >> $GITHUB_STEP_SUMMARY || echo "No errors found" >> $GITHUB_STEP_SUMMARY
          fi