name: Build Proton 10.0 + mshtml xdg-open redirect

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name (shows in Steam)'
        required: false
        default: 'Proton-10.0-PR9608'

env:
  PROTON_BRANCH: proton_10.0

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcActions
          sudo rm -rf /usr/local/graalvm /opt/hostedtoolcache /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules /opt/azcopy
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo docker image prune -af
          sudo rm -rf /tmp/* /var/tmp/*
          df -h /

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            git \
            make \
            python3

      - name: Clone Proton ${{ env.PROTON_BRANCH }}
        run: |
          git clone --branch ${{ env.PROTON_BRANCH }} --depth 1 --recursive \
            https://github.com/ValveSoftware/Proton.git proton-src

      - name: Apply PR #9608 fix (lsteamclient)
        run: |
          cd proton-src
          cp ../lsteamclient_unixlib_patched.cpp lsteamclient/unixlib.cpp

      - name: Configure build
        run: |
          mkdir build-dir
          cd build-dir
          ../proton-src/configure.sh \
            --build-name=${{ github.event.inputs.build_name || 'Proton-10.0-PR9608' }} \
            --container-engine=docker

      - name: Build Proton (redist) with mshtml patch
        working-directory: build-dir
        run: |
          # Start the build in background, redirect to file so we capture
          # the real exit code from make.
          make redist > build.log 2>&1 &
          BUILD_PID=$!

          # Watch for navigate.c and patch it
          echo "Watching for Wine source to be cloned..."
          for i in $(seq 1 720); do
              sleep 5
              NAVFILE=$(find obj-wine64/src-wine obj-wine32/src-wine src-wine \
                  -name navigate.c -path "*/mshtml/*" 2>/dev/null | head -1)
              if [ -n "$NAVFILE" ] && [ -f "$NAVFILE" ]; then
                  if ! grep -q "xdg-open" "$NAVFILE"; then
                      echo "=== FOUND navigate.c at $NAVFILE, patching now ==="
                      python3 ../patch_mshtml_navigate.py "$NAVFILE"
                      echo "=== Patch applied! ==="
                      NAVFILE32=$(find obj-wine32/src-wine src-wine \
                          -name navigate.c -path "*/mshtml/*" 2>/dev/null | head -1)
                      if [ -n "$NAVFILE32" ] && [ "$NAVFILE32" != "$NAVFILE" ] && [ -f "$NAVFILE32" ]; then
                          if ! grep -q "xdg-open" "$NAVFILE32"; then
                              echo "=== Also patching 32-bit navigate.c at $NAVFILE32 ==="
                              python3 ../patch_mshtml_navigate.py "$NAVFILE32"
                          fi
                      fi
                      break
                  else
                      echo "navigate.c already patched"
                      break
                  fi
              fi
              if ! kill -0 $BUILD_PID 2>/dev/null; then
                  echo "Build process ended unexpectedly"
                  break
              fi
          done

          # Wait for build to finish
          echo "Waiting for build to complete..."
          wait $BUILD_PID
          BUILD_EXIT=$?
          echo "Build finished with exit code $BUILD_EXIT"

          # Always show tail of build log for debugging
          echo "=== Last 100 lines of build.log ==="
          tail -100 build.log
          echo "=== Disk space ==="
          df -h /

          exit $BUILD_EXIT

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-dir/build.log
          retention-days: 3

      - name: Package redist
        if: success()
        run: |
          cd build-dir
          tar -cf proton-pr9608-redist.tar redist/

      - name: Upload Proton build artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-10.0-pr9608
          path: build-dir/proton-pr9608-redist.tar
          retention-days: 14
          if-no-files-found: error

      - name: Build log summary
        if: always()
        run: |
          if [ -f build-dir/build.log ]; then
            echo "### Build Errors (last 50 lines with Error)" >> $GITHUB_STEP_SUMMARY
            grep -n '] Error [0-9]' build-dir/build.log | tail -50 >> $GITHUB_STEP_SUMMARY || echo "No Wine-style errors found" >> $GITHUB_STEP_SUMMARY
            echo "### Last 20 lines" >> $GITHUB_STEP_SUMMARY
            tail -20 build-dir/build.log >> $GITHUB_STEP_SUMMARY
          fi