name: Build Proton 10.0 + mshtml xdg-open redirect

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name (shows in Steam)'
        required: false
        default: 'Proton-10.0-PR9608'

env:
  PROTON_BRANCH: proton_10.0

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcActions
          sudo rm -rf /usr/local/graalvm /opt/hostedtoolcache /usr/share/swift
          sudo rm -rf /usr/local/lib/node_modules /opt/azcopy
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo docker image prune -af
          sudo rm -rf /tmp/* /var/tmp/*
          df -h /

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            git \
            make \
            python3

      - name: Clone Proton ${{ env.PROTON_BRANCH }}
        run: |
          git clone --branch ${{ env.PROTON_BRANCH }} --depth 1 \
            https://github.com/ValveSoftware/Proton.git proton-src

      - name: Apply PR #9608 fix (lsteamclient)
        run: |
          cd proton-src
          cp ../lsteamclient_unixlib_patched.cpp lsteamclient/unixlib.cpp
          echo "Applied lsteamclient PR #9608 fix"

      - name: Configure build
        run: |
          mkdir build-dir
          cd build-dir
          ../proton-src/configure.sh \
            --build-name=${{ github.event.inputs.build_name || 'Proton-10.0-PR9608' }} \
            --container-engine=docker

      - name: Patch Wine mshtml (xdg-open redirect)
        run: |
          cd build-dir
          # Clone wine source (make wine-source copies it to src-wine/)
          make wine-source 2>&1 | tail -3
          echo "=== Verifying wine source ==="
          ls src-wine/dlls/mshtml/navigate.c || { echo "ERROR: navigate.c not found"; exit 1; }
          # Apply mshtml navigate.c patch using sed (context-line-number independent)
          # 1. Add #include <unistd.h> after #include <stdarg.h>
          sed -i '/^#include <stdarg.h>$/a #include <unistd.h>' src-wine/dlls/mshtml/navigate.c
          # 2. Add xdg-open redirect after "if(!window->browser)\n        return E_UNEXPECTED;" in navigate_url
          python3 << 'PYEOF'
          import re
          with open("src-wine/dlls/mshtml/navigate.c", "r") as f:
              content = f.read()
          
          redirect_code = '''
    /* Redirect http/https URLs to native Linux browser via xdg-open.
     * Wine's mshtml cannot handle modern OAuth/Xbox Live login pages.
     * Fork+exec xdg-open so the page opens in the real browser (Firefox),
     * then return S_OK without loading anything in mshtml. */
    if(new_url && ((new_url[0]=='h' && new_url[1]=='t' && new_url[2]=='t' && new_url[3]=='p' &&
                    ((new_url[4]==':' && new_url[5]=='/' && new_url[6]=='/') ||
                     (new_url[4]=='s' && new_url[5]==':' && new_url[6]=='/' && new_url[7]=='/'))))) {
        char *url_utf8;
        int len = WideCharToMultiByte(CP_UTF8, 0, new_url, -1, NULL, 0, NULL, NULL);
        if(len > 0) {
            url_utf8 = HeapAlloc(GetProcessHeap(), 0, len);
            WideCharToMultiByte(CP_UTF8, 0, new_url, -1, url_utf8, len, NULL, NULL);
            WARN("mshtml navigate_url: redirecting to xdg-open: %s\\n", url_utf8);
            if(fork() == 0) { execlp("xdg-open", "xdg-open", url_utf8, (char*)NULL); _exit(1); }
            HeapFree(GetProcessHeap(), 0, url_utf8);
        }
        return S_OK;
    }
'''
          # Find navigate_url function and patch it (look for the function signature)
          # We target the specific occurrence inside navigate_url by using a larger context
          func_pattern = r'(HRESULT navigate_url\(HTMLOuterWindow \*window.*?if\(!window->browser\)\s+return E_UNEXPECTED;\n)'
          m = re.search(func_pattern, content, re.DOTALL)
          if not m:
              print("ERROR: Could not find navigate_url function with browser check")
              exit(1)
          # Insert redirect code right after the browser check
          content = content[:m.end()] + redirect_code + content[m.end():]
          with open("src-wine/dlls/mshtml/navigate.c", "w") as f:
              f.write(content)
          print("Successfully patched navigate_url in mshtml")
          PYEOF
          echo "=== Patched navigate.c (first 35 lines) ==="
          head -35 src-wine/dlls/mshtml/navigate.c
          echo "=== Searching for redirect code ==="
          grep -n "xdg-open" src-wine/dlls/mshtml/navigate.c

      - name: Build Proton (redist)
        working-directory: build-dir
        run: |
          make redist 2>&1 | tee build.log

      - name: Package redist
        if: success()
        run: |
          cd build-dir
          tar -cf proton-pr9608-redist.tar redist/

      - name: Upload Proton build artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-10.0-pr9608
          path: build-dir/proton-pr9608-redist.tar
          retention-days: 14
          if-no-files-found: error

      - name: Build log summary
        if: always()
        run: |
          if [ -f build-dir/build.log ]; then
            echo "### Build Errors (last 50 lines with Error)" >> $GITHUB_STEP_SUMMARY
            grep -n '] Error [0-9]' build-dir/build.log | tail -50 >> $GITHUB_STEP_SUMMARY || echo "No errors found" >> $GITHUB_STEP_SUMMARY
          fi